<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стильная анкета</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h1>АНКЕТА</h1>
        
        <form>
            <!-- Поле ФИО -->
            <div class="form-group">
                <label>ФИО</label>
                <input type="text" placeholder="Иванова Анна Петровна">
            </div>

            <!-- Радиокнопки Пол -->
            <div class="form-group">
                <label>Пол</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="gender" checked>
                        <span class="radio-custom"></span>
                        <span class="label-text">Женский</span>
                    </label>
                    <label>
                        <input type="radio" name="gender">
                        <span class="radio-custom"></span>
                        <span class="label-text">Мужской</span>
                    </label>
                </div>
            </div>

            <!-- Поле Пароль -->
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" placeholder="••••••••">
            </div>

            <!-- Выпадающий список -->
            <div class="form-group">
                <label>Страна</label>
                <select>
                    <option>Россия</option>
                    <option>United Kingdom</option>
                    <option>США</option>
                    <option>Германия</option>
                </select>
            </div>

            <!-- Чекбоксы -->
            <div class="form-group">
                <label>Предпочтения</label>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="label-text">Мороженое</span>
                    </label>
                    <label>
                        <input type="checkbox" checked>
                        <span class="checkmark"></span>
                        <span class="label-text">Мясо</span>
                    </label>
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="label-text">Салат</span>
                    </label>
                </div>
            </div>

            <!-- Текстовое поле -->
            <div class="form-group">
                <label>Ваши пожелания</label>
                <textarea rows="4" placeholder="Напишите то, что вы любите..."></textarea>
            </div>

            <!-- Кнопка отправки -->
            <button type="submit">
                <span>Отправить анкету</span>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 12H20M20 12L14 6M20 12L14 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </form>
    </div>
</body>
</html>
